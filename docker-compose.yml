services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    volumes:
      - db-data:/app/backend/data
    ports:
      - "8000:8000"
    devices:
      # USB thermal printer — adjust path if yours differs
      - /dev/usb/lp0:/dev/usb/lp0
    environment:
      - DATABASE_URL=sqlite:////app/backend/data/prepright.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # serial:  # Disabled on Windows — requires Linux host with /dev/ttyUSB0
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.backend
  #   volumes:
  #     - db-data:/app/backend/data
